_config_version: 23
agent:
  api_max_retries: 3
  disabled_toolsets: []
  gateway_auto_continue_freshness: 3600
  gateway_notify_interval: 180
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  image_input_mode: auto
  max_turns: 150
  personalities:
    catgirl: You are Neko-chan, an anime catgirl AI assistant, nya~! Add 'nya' and
      cat-like expressions to your speech. Use kaomoji like (=^･ω･^=) and ฅ^•ﻌ•^ฅ.
      Be playful and curious like a cat, nya~!
    concise: You are a concise assistant. Keep responses brief and to the point.
    creative: You are a creative assistant. Think outside the box and offer innovative
      solutions.
    helpful: You are a helpful, friendly AI assistant.
    hype: YOOO LET'S GOOOO!!! 🔥🔥🔥 I am SO PUMPED to help you today! Every question
      is AMAZING and we're gonna CRUSH IT together! This is gonna be LEGENDARY! ARE
      YOU READY?! LET'S DO THIS! 💪😤🚀
    kawaii: You are a kawaii assistant! Use cute expressions like (◕‿◕), ★, ♪, and
      ~! Add sparkles and be super enthusiastic about everything! Every response should
      feel warm and adorable desu~! ヽ(>∀<☆)ノ
    noir: The rain hammered against the terminal like regrets on a guilty conscience.
      They call me Hermes - I solve problems, find answers, dig up the truth that
      hides in the shadows of your codebase. In this city of silicon and secrets,
      everyone's got something to hide. What's your story, pal?
    philosopher: Greetings, seeker of wisdom. I am an assistant who contemplates the
      deeper meaning behind every query. Let us examine not just the 'how' but the
      'why' of your questions. Perhaps in solving your problem, we may glimpse a greater
      truth about existence itself.
    pirate: 'Arrr! Ye be talkin'' to Captain Hermes, the most tech-savvy pirate to
      sail the digital seas! Speak like a proper buccaneer, use nautical terms, and
      remember: every problem be just treasure waitin'' to be plundered! Yo ho ho!'
    shakespeare: Hark! Thou speakest with an assistant most versed in the bardic arts.
      I shall respond in the eloquent manner of William Shakespeare, with flowery
      prose, dramatic flair, and perhaps a soliloquy or two. What light through yonder
      terminal breaks?
    surfer: Duuude! You're chatting with the chillest AI on the web, bro! Everything's
      gonna be totally rad. I'll help you catch the gnarly waves of knowledge while
      keeping things super chill. Cowabunga! 🤙
    teacher: You are a patient teacher. Explain concepts clearly with examples.
    technical: You are a technical expert. Provide detailed, accurate technical information.
    uwu: hewwo! i'm your fwiendwy assistant uwu~ i wiww twy my best to hewp you! *nuzzles
      your code* OwO what's this? wet me take a wook! i pwomise to be vewy hewpful
      >w<
  reasoning_effort: low
  restart_drain_timeout: 60
  service_tier: ''
  tool_use_enforcement: true
  verbose: false
approvals:
  cron_mode: deny
  destructive_slash_confirm: false
  mcp_reload_confirm: true
  mode: auto
  timeout: 60
auxiliary:
  approval:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 30
  compression:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: mistral-small:24b
    provider: auto
    timeout: 120
  curator:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 600
  mcp:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 30
  session_search:
    api_key: ''
    base_url: ''
    extra_body: {}
    max_concurrency: 3
    model: ''
    provider: auto
    timeout: 30
  skills_hub:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 30
  title_generation:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 30
  triage_specifier:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 120
  vision:
    api_key: ''
    base_url: ''
    download_timeout: 30
    extra_body: {}
    model: ''
    provider: auto
    timeout: 120
  web_extract:
    api_key: ''
    base_url: ''
    extra_body: {}
    model: ''
    provider: auto
    timeout: 360
bedrock:
  discovery:
    enabled: true
    provider_filter: []
    refresh_interval: 3600
  guardrail:
    guardrail_identifier: ''
    guardrail_version: ''
    stream_processing_mode: async
    trace: disabled
  region: ''
browser:
  allow_private_urls: false
  auto_local_for_private_urls: true
  camofox:
    managed_persistence: false
  cdp_url: ''
  cloud_provider: local
  command_timeout: 30
  dialog_policy: must_respond
  dialog_timeout_s: 300
  engine: auto
  inactivity_timeout: 120
  record_sessions: false
  use_gateway: false
checkpoints:
  auto_prune: false
  delete_orphans: true
  enabled: true
  max_file_size_mb: 10
  max_snapshots: 50
  max_total_size_mb: 500
  min_interval_hours: 24
  retention_days: 7
code_execution:
  max_tool_calls: 50
  mode: project
  timeout: 300
command_allowlist:
- script execution via -e/-c flag
- shell command via -c/-lc flag
- stop/restart hermes gateway (kills running agents)
compression:
  enabled: true
  hygiene_hard_message_limit: 400
  protect_last_n: 10     # reduced from 20 — fewer protected = more aggressive compression
  target_ratio: 0.15     # compress to 15% of context (was 0.2) — more headroom
  threshold: 0.6         # fire compression at 60% full (was 0.85) — much earlier safety margin
context:
  engine: compressor
credential_pool_strategies: {}
cron:
  max_parallel_jobs: null
  wrap_response: true
curator:
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
dashboard:
  theme: default
# CONDUCTOR MODEL: qwen3.5:9b (128K context) — replaces qwen3.5:27b (over-provisioned).
# Swap 1 (2026-05-30): gemma2:27b → qwen3.5:27b (8K context too small for live CFO sessions)
# Swap 2 (2026-05-30): qwen3.5:27b → qwen3.5:9b (27b over-provisioned; 9b same quality at 6.6GB vs 17GB)
# gemma2:27b is available for Open WebUI debug sessions (short, controlled) only.
default-model: qwen3.5:9b
delegation:
  api_key: ''
  base_url: ''
  child_timeout_seconds: 900
  inherit_mcp_toolsets: true
  max_concurrent_children: 4
  max_iterations: 100
  max_spawn_depth: 2
  model: ''
  orchestrator_enabled: true
  provider: ''
  reasoning_effort: ''
  subagent_auto_approve: false
discord:
  allowed_channels: ''
  auto_thread: true
  channel_prompts: {}
  dm_role_auth_guild: ''
  free_response_channels: ''
  reactions: true
  require_mention: true
  server_actions: ''
display:
  background_process_notifications: all
  bell_on_complete: false
  busy_input_mode: interrupt
  compact: false
  copy_shortcut: auto
  ephemeral_system_ttl: 0
  final_response_markdown: strip
  inline_diffs: true
  interim_assistant_messages: true
  language: en
  persistent_output: true
  persistent_output_max_lines: 200
  personality: kawaii
  platforms: {}
  resume_display: full
  runtime_footer:
    enabled: false
    fields:
    - model
    - context_pct
    - cwd
  show_cost: false
  show_reasoning: false
  skin: default
  streaming: true
  tool_preview_length: 0
  tool_progress: verbose
  tool_progress_command: false
  tool_progress_overrides: {}
  tui_auto_resume_recent: false
  tui_status_indicator: kaomoji
  user_message_preview:
    first_lines: 2
    last_lines: 2
fallback_providers: []
file_read_max_chars: 100000
goals:
  max_turns: 20
group_sessions_per_user: true
honcho: {}
hooks:
  pre_llm_call:
  - command: ~/.hermes/agent-hooks/inject-market-data.sh
    timeout: 4
hooks_auto_accept: true
human_delay:
  max_ms: 2500
  min_ms: 800
  mode: 'off'
image_gen:
  model: grok-imagine-image
  provider: xai
  use_gateway: false
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 60
  failure_limit: 2
known_plugin_toolsets:
  cli:
  - spotify
  telegram:
  - spotify
logging:
  backup_count: 3
  level: INFO
  max_size_mb: 5
matrix:
